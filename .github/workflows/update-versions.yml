name: Update Version List

on:
  push:
    branches:
      - script
    paths:
      - 'main.py'
      - 'default_clients.json'
      - 'community_clients/*.json'
  workflow_dispatch:
  schedule:
    - cron: '0 */2 * * *'

permissions:
  contents: write

jobs:
  update-versions:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: script

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --frozen

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip

      - name: Run version generator
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run main.py

      - name: Commit and push changes to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version_list.json community_versions/*.json
          git stash push --message "generated-files"
          git fetch origin main
          git checkout main
          git stash pop
          git add version_list.json community_versions/*.json
          git diff --cached --quiet || git commit -m "chore: update version list [skip ci]"
          git push origin HEAD:main
